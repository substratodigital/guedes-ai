kind = "web"
previewPath = "/"
title = "GUEDES.AI — Luís Guedes"
version = "1.0.0"
id = "artifacts/guedes-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18945

[services.development]
run = "pnpm --filter @workspace/guedes-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/guedes-ai", "run", "build" ]
publicDir = "artifacts/guedes-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18945"
BASE_PATH = "/"
